baseURL: https://blog.waldy.id/
languageCode: en-us
title: Waldy's blog
theme: "PaperMod"

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  #env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: Sofyan waldy's blog
  description: welcome to waldy's personal blog, Where I share about my personal insights, ideas and thoughts on technology.
  keyword: [personal blog, tech blog, portfolio]
  author: Me
  ShowShareButton: true
  ShowReadingTime: true
  ShowBreadCrumbs: true
  comments: true
  homeInfoParams:
    Title: "Hi, \U0001F44B"
    Content: I'm Waldy, a self-taught software engineer. I think a lot but don't talk much, so I created this blog to share my ideas and thoughts.

  socialIcons:
    - name: "linkedin"
      url: "https://www.linkedin.com/in/sopyan-waldy/"
    - name: "github"
      url: "https://github.com/sofyanwaldy"

menu:
  main:
    - identifier: Archives
      name: Archives
      url: /archives/
