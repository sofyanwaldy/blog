baseURL: https://waldy.id/
languageCode: id
title: Waldy's blog
theme: "PaperMod"

enableRobotsTXT: true

outputs:
  home:
    - HTML
    - RSS
    - JSON
buildDrafts: false
buildFuture: false
buildExpired: false
googleAnalytics: G-821S37WCX8

minify:
  disableXML: true
  minifyOutput: true

pagination:
  pagerSize: 5
  path: page

markup:
  goldmark:
    renderer:
      unsafe: true

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: Sofyan waldy's blog
  description: welcome to waldy's personal blog, Where I share about my personal insights, ideas and thoughts on technology.
  keyword: [personal blog, tech blog, portfolio]
  comments: true
  giscus:
    repo: "sofyanwaldy/blog"
    repoId: "R_kgDOMYE9UA"
    category: "Announcements" # default category, change if needed
    categoryId: "DIC_kwDOMYE9UM4C_Um3"
  author: Me
  ShowShareButton: true
  ShowCodeCopyButtons: true
  ShowReadingTime: true
  ShowBreadCrumbs: true
  ShowToc: true
  TocOpen: true
  mainSections: ["posts", "stories", "books"]
  contact:
    email: "sofyanwaldy@gmail.com"
  homeInfoParams:
    Title: "Halo, aku Waldy👋"
    Content: "Aku seorang software engineer otodidak. Aku banyak berpikir tapi jarang bicara, makanya aku bikin blog ini buat berbagi ide dan pemikiranku."

  socialIcons:
    - name: "mastodon"
      url: "https://mastodon.social/@swaldy"
    - name: "linkedin"
      url: "https://www.linkedin.com/in/sopyan-waldy/"
    - name: "github"
      url: "https://github.com/sofyanwaldy"
    - name: "rss"
      url: "/index.xml"

menu:
  main:
    - identifier: Search
      name: Cari
      url: /search/
    - identifier: Stories
      name: Cerita
      url: /stories/
    - identifier: About
      name: Tentang
      url: /about/
    - identifier: Books
      name: Buku
      url: /books
