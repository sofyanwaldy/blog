baseURL: https://waldy.id/
languageCode: en-us
title: Waldy's blog
theme: "PaperMod"

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
googleAnalytics: G-821S37WCX8

minify:
  disableXML: true
  minifyOutput: true

pagination:
  pagerSize: 5
  path: page

markup:
  goldmark:
    renderer:
      unsafe: true

params:
  env: development # to enable google analytics, opengraph, twitter-cards and schema.
  title: Sofyan waldy's blog
  description: welcome to waldy's personal blog, Where I share about my personal insights, ideas and thoughts on technology.
  keyword: [personal blog, tech blog, portfolio]
  comments: false
  author: Me
  ShowShareButton: true
  ShowReadingTime: true
  ShowBreadCrumbs: true
  mainSections: ["posts", "stories", "books"]
  contact:
    email: "sofyanwaldy@gmail.com"
  homeInfoParams:
    Title: "Hi, I'm Waldy👋"
    Content: I'm self-taught software engineer. I think a lot but don't talk much, so I created this blog to share my ideas and thoughts.

  socialIcons:
    - name: "mastodon"
      url: "https://mastodon.social/@swaldy"
    - name: "linkedin"
      url: "https://www.linkedin.com/in/sopyan-waldy/"
    - name: "github"
      url: "https://github.com/sofyanwaldy"
    - name: "rss"
      url: "/index.xml"

menu:
  main:
    - identifier: Stories
      name: Stories
      url: /stories/
    - identifier: About
      name: About
      url: /about/
    - identifier: Books
      name: Books
      url: /books
